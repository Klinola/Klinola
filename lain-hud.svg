<svg xmlns="http://www.w3.org/2000/svg" width="240" height="320" viewBox="0 0 240 320">
  <defs>
    <clipPath id="frame-clip">
      <rect x="6" y="6" width="228" height="298"/>
    </clipPath>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" x="0" y="0" width="3" height="3">
      <rect x="0" y="0" width="3" height="2" fill="transparent"/>
      <rect x="0" y="2" width="3" height="1" fill="#00e5ff" fill-opacity="0.12"/>
    </pattern>
    <linearGradient id="beam-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Outer cyan border ring -->
  <rect x="2" y="2" width="236" height="306" fill="none" stroke="#00e5ff" stroke-width="1"/>
  <!-- Inner pink border -->
  <rect x="6" y="6" width="228" height="298" fill="none" stroke="#ff2e93" stroke-width="1"/>

  <!-- Lain GIF -->
  <g clip-path="url(#frame-clip)">
    <image href="https://raw.githubusercontent.com/Klinola/Klinola/main/lain-lain-iwakura.gif"
           x="6" y="6" width="228" height="298" preserveAspectRatio="xMidYMid slice"/>

    <!-- Scanlines overlay, scrolling -->
    <rect x="6" y="-3" width="228" height="304" fill="url(#scanlines)">
      <animateTransform attributeName="transform" type="translate"
                       from="0 0" to="0 3" dur="0.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Sweeping beam, top to bottom -->
    <rect x="6" y="-30" width="228" height="24" fill="url(#beam-grad)">
      <animate attributeName="y" from="-30" to="304" dur="3.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Glitch bar A (cyan) - jumps between 3 y positions -->
    <rect x="6" width="228" height="2" fill="#00e5ff" opacity="0">
      <animate attributeName="y" values="92;92;195;195;240;240"
               keyTimes="0;0.1;0.5;0.52;0.8;0.82" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0;0;0.9;0;0;1;0;0"
               keyTimes="0;0.1;0.11;0.5;0.52;0.53;0.8;0.82;0.83;1"
               dur="5s" repeatCount="indefinite"/>
      <animate attributeName="height" values="2;3;2;2;2;2;2;4;2;2"
               keyTimes="0;0.1;0.11;0.5;0.52;0.53;0.8;0.82;0.83;1"
               dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- Glitch bar B (pink, offset phase) -->
    <rect x="6" width="228" height="1" fill="#ff2e93" opacity="0">
      <animate attributeName="y" values="140;140;72;72"
               keyTimes="0;0.2;0.6;0.62" dur="5s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0;0;0.8;0"
               keyTimes="0;0.2;0.22;0.6;0.62;0.63"
               dur="5s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Corner brackets (4 L-shapes, animated stroke color) -->
  <g fill="none" stroke="#00e5ff" stroke-width="2">
    <!-- top-left -->
    <path d="M 0 14 L 0 0 L 14 0">
      <animate attributeName="stroke" values="#00e5ff;#ff2e93;#00e5ff"
               dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- top-right -->
    <path d="M 226 0 L 240 0 L 240 14">
      <animate attributeName="stroke" values="#00e5ff;#ff2e93;#00e5ff"
               dur="2.5s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <!-- bottom-left -->
    <path d="M 0 296 L 0 310 L 14 310">
      <animate attributeName="stroke" values="#00e5ff;#ff2e93;#00e5ff"
               dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
    </path>
    <!-- bottom-right -->
    <path d="M 226 310 L 240 310 L 240 296">
      <animate attributeName="stroke" values="#00e5ff;#ff2e93;#00e5ff"
               dur="2.5s" begin="1.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ID badge -->
  <g transform="translate(140, 314)">
    <rect x="0" y="-10" width="92" height="14" fill="#0a0014" stroke="#00e5ff" stroke-width="0.5"/>
    <text x="5" y="1" font-family="monospace" font-size="9" fill="#00e5ff" letter-spacing="1">ID: 0xA3F1</text>
    <text x="74" y="1" font-family="monospace" font-size="9" fill="#ff2e93">
      _
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.8s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
