name: 3D Contribution Graph
on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate 3D contribution SVG
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          SETTING_JSON: .github/3d-contrib-settings.json

      - name: Promote SVG to repo root
        run: |
          cp profile-3d-contrib/profile-3d.svg profile-3d.svg

      - name: Commit generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d.svg profile-3d-contrib/
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh 3D contribution graph"
            git push
          fi
